name: Keep Render instance awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping live site
        run: curl -sf -o /dev/null -w "HTTP %{http_code}\n" https://inventory-sync-demo-7d5u.onrender.com/api/products
